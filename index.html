<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sequential Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0c0e14;
      --surface:      #12141c;
      --panel:        #1a1d28;
      --panel-hover:  #20243300;
      --border:       rgba(255,255,255,0.07);
      --border-hi:    rgba(255,255,255,0.14);
      --text:         #e6e8f0;
      --muted:        #5c6070;
      --muted-hi:     #8890a8;
      --accent:       #7c6af7;
      --accent-glow:  rgba(124,106,247,0.18);
      --green:        #34d077;
      --red:          #f05252;
      --radius:       10px;
      --radius-sm:    6px;
    }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── header ── */
    .header {
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.75rem;
      display: flex;
      align-items: center;
      gap: 0.65rem;
      background: var(--surface);
    }

    .logo {
      width: 26px; height: 26px;
      background: var(--accent);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .logo svg { width: 14px; height: 14px; fill: #fff; }

    .header-title { font-size: 14px; font-weight: 500; }
    .header-sub {
      font-size: 12px;
      color: var(--muted);
      margin-left: auto;
      font-family: 'JetBrains Mono', monospace;
    }

    /* ── controls ── */
    .controls {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 1.75rem;
    }

    .url-row {
      display: flex;
      gap: 0.6rem;
      margin-bottom: 0.9rem;
    }

    input[type="text"],
    input[type="url"],
    input[type="number"],
    select {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      outline: none;
      transition: border-color 0.18s;
    }

    input[type="text"]:focus,
    input[type="url"]:focus,
    input[type="number"]:focus,
    select:focus { border-color: var(--accent); }

    #urlInput {
      width: 100%;
      padding: 0.55rem 0.9rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
    }

    #urlInput::placeholder { color: var(--muted); }

    /* ── history dropdown ── */
    .url-wrap { position: relative; flex: 1; }

    .hist-drop {
      position: absolute;
      top: calc(100% + 4px);
      left: 0; right: 0;
      background: var(--panel);
      border: 1px solid var(--border-hi);
      border-radius: var(--radius-sm);
      z-index: 100;
      display: none;
      box-shadow: 0 8px 28px rgba(0,0,0,0.5);
      max-height: 440px;
      overflow-y: auto;
    }
    .hist-drop.open { display: block; }

    .hist-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 0.75rem;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.13s;
    }
    .hist-item:hover,
    .hist-item.hist-highlighted { background: rgba(255,255,255,0.04); }
    .hist-item.hist-highlighted { outline: 1px solid rgba(124,106,247,0.3); outline-offset: -1px; }

    .hist-thumb {
      width: 54px; height: 40px;
      object-fit: cover;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
    }
    .hist-thumb-ph {
      width: 54px; height: 40px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted);
      font-size: 18px;
    }

    .hist-url {
      flex: 1;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }

    .hist-meta { display: flex; align-items: center; gap: 0.45rem; flex-shrink: 0; }

    .hist-count {
      font-size: 11px;
      color: var(--accent);
      font-family: 'JetBrains Mono', monospace;
      background: var(--accent-glow);
      padding: 1px 6px;
      border-radius: 3px;
    }

    .hist-date { font-size: 11px; color: var(--muted); white-space: nowrap; }

    .hist-del {
      background: none; border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 2px 5px;
      border-radius: 3px;
      font-size: 12px;
      line-height: 1;
      flex-shrink: 0;
      transition: color 0.13s, background 0.13s;
    }
    .hist-del:hover { color: var(--red); background: rgba(240,82,82,0.1); }

    .hist-footer {
      padding: 0.4rem 0.75rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
    }
    .hist-clear-all {
      font-size: 11px; color: var(--muted);
      cursor: pointer; background: none; border: none;
      transition: color 0.13s;
    }
    .hist-clear-all:hover { color: var(--red); }

    .hist-empty { padding: 0.75rem; font-size: 12px; color: var(--muted); text-align: center; }

    /* ── url detect hint ── */
    .url-hint {
      display: none;
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--muted);
      margin-top: 0.45rem;
      padding: 0 0.1rem;
      line-height: 1.5;
    }
    .url-hint.visible { display: block; }
    .url-hint .hint-base { color: var(--accent); }
    .url-hint .hint-tag {
      display: inline-block;
      background: var(--accent-glow);
      color: var(--accent);
      border-radius: 3px;
      padding: 0 5px;
      margin-left: 4px;
      font-size: 10px;
    }

    /* ── history nav buttons ── */
    .nav-group { display: flex; align-items: center; gap: 0; flex-shrink: 0; margin-left: auto; }
    .nav-btn {
      width: 30px;
      padding: 0.55rem 0;
      font-size: 15px;
      display: flex; align-items: center; justify-content: center;
      background: var(--panel);
      color: var(--muted-hi);
      border: 1px solid var(--border);
    }
    .nav-btn:first-child { border-radius: var(--radius-sm) 0 0 var(--radius-sm); border-right: none; }
    .nav-btn:last-child  { border-radius: 0 var(--radius-sm) var(--radius-sm) 0; border-left: none; }
    .nav-btn:hover:not(:disabled) { color: var(--text); border-color: var(--border-hi); z-index: 1; }
    .nav-btn:disabled { opacity: 0.3; cursor: default; }
    .nav-pos {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      min-width: 42px;
      text-align: center;
      background: var(--panel);
      border: 1px solid var(--border);
      border-left: none; border-right: none;
      align-self: stretch;
      display: flex; align-items: center; justify-content: center;
    }

    .btn {
      padding: 0.55rem 1.1rem;
      border-radius: var(--radius-sm);
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.18s, transform 0.1s, background 0.18s;
      white-space: nowrap;
    }
    .btn:active { transform: scale(0.97); }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:disabled { opacity: 0.4; cursor: default; }

    .btn-ghost {
      background: var(--panel);
      color: var(--muted-hi);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { border-color: var(--border-hi); color: var(--text); }

    .btn-danger {
      background: rgba(240,82,82,0.1);
      color: var(--red);
      border: 1px solid rgba(240,82,82,0.2);
    }
    .btn-danger:hover { background: rgba(240,82,82,0.18); }

    .options-row {
      display: flex;
      gap: 1.25rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .opt {
      display: flex;
      align-items: center;
      gap: 0.45rem;
    }

    .opt label {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    select {
      padding: 0.3rem 0.55rem;
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      cursor: pointer;
    }

    input[type="number"] {
      width: 64px;
      padding: 0.3rem 0.55rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
    }

    /* ── status bar ── */
    .statusbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.6rem 1.75rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 12px;
      color: var(--muted);
      min-height: 38px;
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .dot.scanning { background: var(--accent); animation: blink 1s ease-in-out infinite; }
    .dot.done     { background: var(--green); }
    .dot.error    { background: var(--red); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

    .scan-tape {
      flex: 1;
      overflow: hidden;
      position: relative;
      height: 18px;
      display: none;
    }

    .tape-inner {
      display: flex;
      gap: 4px;
      position: absolute;
      right: 0;
      top: 0;
      transition: none;
    }

    .tape-cell {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      padding: 1px 5px;
      border-radius: 3px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .tape-cell.ok   { background: rgba(52,208,119,0.12); color: #34d077; }
    .tape-cell.fail { background: rgba(240,82,82,0.1);   color: #f05252; }

    .count-badge {
      margin-left: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      display: none;
    }

    /* ── gallery ── */
    .gallery { flex: 1; padding: 1.5rem 1.75rem; }

    .grid {
      columns: 4;
      column-gap: 10px;
    }
    @media(max-width:1100px){ .grid{ columns:3; } }
    @media(max-width:760px) { .grid{ columns:2; } }
    @media(max-width:440px) { .grid{ columns:1; } }

    .tile {
      break-inside: avoid;
      margin-bottom: 10px;
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--panel);
      cursor: zoom-in;
      position: relative;
      opacity: 0;
      animation: fadeUp 0.35s forwards;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(8px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .tile img {
      width: 100%;
      display: block;
      transition: transform 0.35s ease;
    }
    .tile:hover img { transform: scale(1.04); }

    .tile-label {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 0.4rem 0.6rem;
      background: linear-gradient(transparent, rgba(0,0,0,0.65));
      display: flex;
      align-items: center;
      justify-content: space-between;
      opacity: 0;
      transition: opacity 0.2s;
      border-radius: 0 0 var(--radius) var(--radius);
    }
    .tile:hover .tile-label { opacity: 1; }

    .tile-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: rgba(255,255,255,0.75);
    }

    .tile-expand {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
    }

    /* empty state */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      padding: 6rem 2rem;
      color: var(--muted);
    }

    .empty svg { opacity: 0.2; }
    .empty p { font-size: 14px; }

    /* ── lightbox ── */
    .lb {
      position: fixed; inset: 0;
      background: rgba(5,6,10,0.94);
      z-index: 200;
      display: none;
      flex-direction: column;
    }
    .lb.open { display: flex; }

    .lb-top {
      padding: 0.9rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .lb-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--muted);
    }

    .lb-acts { display: flex; gap: 0.5rem; }

    .lb-act {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--muted-hi);
      border-radius: var(--radius-sm);
      padding: 0.3rem 0.7rem;
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: border-color 0.18s, color 0.18s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }
    .lb-act:hover { border-color: var(--border-hi); color: var(--text); }

    .lb-body {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 1rem;
      overflow: hidden;
    }

    .lb-arrow {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: var(--text);
      width: 44px; height: 44px;
      border-radius: 50%;
      font-size: 22px;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.18s;
      display: flex; align-items: center; justify-content: center;
      line-height: 1;
    }
    .lb-arrow:hover { background: rgba(255,255,255,0.12); }
    .lb-arrow:disabled { opacity: 0.2; cursor: default; }

    .lb-img {
      max-width: calc(100vw - 160px);
      max-height: calc(100vh - 130px);
      object-fit: contain;
      border-radius: var(--radius);
    }

    .lb-bottom {
      padding: 0.65rem 1.25rem;
      border-top: 1px solid var(--border);
      text-align: center;
      flex-shrink: 0;
    }

    .lb-src {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      word-break: break-all;
    }
  </style>
</head>
<body>

<header class="header">
  <div class="logo">
    <svg viewBox="0 0 14 14" xmlns="http://www.w3.org/2000/svg">
      <rect x="0"  y="0"  width="6" height="6" rx="1.2"/>
      <rect x="8"  y="0"  width="6" height="6" rx="1.2"/>
      <rect x="0"  y="8"  width="6" height="6" rx="1.2"/>
      <rect x="8"  y="8"  width="6" height="6" rx="1.2"/>
    </svg>
  </div>
  <span class="header-title">Sequential Gallery</span>
  <span class="header-sub" id="headerInfo">no images loaded</span>
</header>

<div class="controls">
  <div class="url-row">
    <div class="url-wrap">
      <input type="url" id="urlInput"
        placeholder="https://example.com/gallery/img"
        autocomplete="off" spellcheck="false">
      <div class="hist-drop" id="histDrop"></div>
    </div>
    <button class="btn btn-primary" id="loadBtn" onclick="startLoad()">Load</button>
    <button class="btn btn-ghost"   id="stopBtn" onclick="stop()" style="display:none">Stop</button>
    <button class="btn btn-danger"  id="clearBtn" onclick="clearAll()">Clear</button>
  </div>
  <div class="url-hint" id="urlHint"></div>
  <div class="options-row">
    <div class="opt">
      <label>Start #</label>
      <input type="number" id="startNum" value="1" min="0" max="9999">
    </div>
    <div class="opt">
      <label>Zero-pad digits</label>
      <select id="digits">
        <option value="1">1 → 1, 2, 3…</option>
        <option value="2" selected>2 → 01, 02, 03…</option>
        <option value="3">3 → 001, 002…</option>
        <option value="4">4 → 0001, 0002…</option>
      </select>
    </div>
    <div class="opt">
      <label>Extension</label>
      <select id="ext">
        <option value=".jpg" selected>.jpg</option>
        <option value=".jpeg">.jpeg</option>
        <option value=".png">.png</option>
        <option value=".webp">.webp</option>
        <option value=".gif">.gif</option>
      </select>
    </div>
    <div class="opt">
      <label>Stop after</label>
      <input type="number" id="maxFails" value="1" min="1" max="20">
      <label>miss(es)</label>
    </div>
    <div class="nav-group">
      <button class="nav-btn" id="navPrev" onclick="navHist(-1)" title="Newer" disabled>←</button>
      <span class="nav-pos" id="navPos"></span>
      <button class="nav-btn" id="navNext" onclick="navHist(1)" title="Older" disabled>→</button>
    </div>
  </div>
</div>

<div class="statusbar">
  <div class="dot" id="dot"></div>
  <span id="statusTxt">Enter a base URL and click Load.</span>
  <div class="scan-tape" id="tape"><div class="tape-inner" id="tapeInner"></div></div>
  <span class="count-badge" id="countBadge"></span>
</div>

<div class="gallery" id="gallery">
  <div class="empty">
    <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="4"  y="4"  width="24" height="24" rx="4" fill="#e6e8f0"/>
      <rect x="36" y="4"  width="24" height="24" rx="4" fill="#e6e8f0"/>
      <rect x="4"  y="36" width="24" height="24" rx="4" fill="#e6e8f0"/>
      <rect x="36" y="36" width="24" height="24" rx="4" fill="#e6e8f0"/>
    </svg>
    <p>Images will appear as they load.</p>
  </div>
</div>

<!-- Lightbox -->
<div class="lb" id="lb">
  <div class="lb-top">
    <span class="lb-count" id="lbCount"></span>
    <div class="lb-acts">
      <a class="lb-act" id="lbDl" download>
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 1v7M3 6l3 3 3-3M1 10h10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Download
      </a>
      <button class="lb-act" onclick="closeLb()">
        <svg width="11" height="11" viewBox="0 0 11 11" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M1 1l9 9M10 1L1 10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        Close
      </button>
    </div>
  </div>
  <div class="lb-body">
    <button class="lb-arrow" id="lbPrev" onclick="lbNav(-1)">&#8249;</button>
    <img class="lb-img" id="lbImg" src="" alt="Gallery image">
    <button class="lb-arrow" id="lbNext" onclick="lbNav(1)">&#8250;</button>
  </div>
  <div class="lb-bottom">
    <div class="lb-src" id="lbSrc"></div>
  </div>
</div>

<script>
  let imgs = [];
  let lbIdx = 0;
  let halted = false;

  function pad(n, d) { return String(n).padStart(d, '0'); }
  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── history (localStorage) ── */
  const HIST_KEY = 'seq-gallery-history';

  function loadHistory() {
    try { return JSON.parse(localStorage.getItem(HIST_KEY)) || []; }
    catch(e) { return []; }
  }

  function saveToHistory(entry) {
    let hist = loadHistory();
    hist = hist.filter(h => h.url !== entry.url); // remove dupe
    hist.unshift(entry);
    localStorage.setItem(HIST_KEY, JSON.stringify(hist));
  }

  function removeFromHistory(url) {
    const hist = loadHistory().filter(h => h.url !== url);
    localStorage.setItem(HIST_KEY, JSON.stringify(hist));
  }

  function clearHistory() {
    localStorage.removeItem(HIST_KEY);
    histPos = -1;
    updateHistNav();
    hideHistDrop();
  }

  function formatDate(iso) {
    const d = new Date(iso), now = new Date(), diff = now - d;
    if (diff < 60000)     return 'just now';
    if (diff < 3600000)   return `${Math.floor(diff / 60000)}m ago`;
    if (diff < 86400000)  return `${Math.floor(diff / 3600000)}h ago`;
    if (diff < 604800000) return `${Math.floor(diff / 86400000)}d ago`;
    return d.toLocaleDateString();
  }

  let _filteredHist = [];
  let histHighlightIdx = -1;
  let histPos = -1;

  function updateHistNav() {
    const hist = loadHistory();
    const prev = document.getElementById('navPrev');
    const next = document.getElementById('navNext');
    const pos  = document.getElementById('navPos');
    if (hist.length === 0) {
      prev.disabled = next.disabled = true;
      pos.textContent = '';
      return;
    }
    prev.disabled = histPos <= 0;
    next.disabled = histPos >= hist.length - 1;
    if (histPos < 0) {
      next.disabled = false;
      pos.textContent = '';
    } else {
      pos.textContent = `${histPos + 1} / ${hist.length}`;
    }
  }

  function gotoHist(idx) {
    const hist = loadHistory();
    if (idx < 0 || idx >= hist.length) return;
    histPos = idx;
    const entry = hist[idx];
    urlInput.value = entry.url;
    if (entry.digits !== undefined)   document.getElementById('digits').value   = entry.digits;
    if (entry.ext)                    document.getElementById('ext').value      = entry.ext;
    if (entry.startNum !== undefined) document.getElementById('startNum').value = entry.startNum;
    if (entry.maxFails !== undefined) document.getElementById('maxFails').value = entry.maxFails;
    document.getElementById('urlHint').classList.remove('visible');
    hideHistDrop();
    startLoad(true);   // fromNav — skip re-saving
  }

  function navHist(dir) {
    const hist = loadHistory();
    if (hist.length === 0) return;
    const newPos = histPos < 0
      ? (dir > 0 ? 0 : 0)
      : Math.max(0, Math.min(hist.length - 1, histPos + dir));
    gotoHist(newPos);
  }

  function highlightHistItem(idx) {
    const items = histDrop.querySelectorAll('.hist-item');
    items.forEach(el => el.classList.remove('hist-highlighted'));
    histHighlightIdx = Math.max(-1, Math.min(idx, items.length - 1));
    if (histHighlightIdx >= 0) {
      items[histHighlightIdx].classList.add('hist-highlighted');
      items[histHighlightIdx].scrollIntoView({ block: 'nearest' });
    }
  }

  function renderHistDrop(filter) {
    histHighlightIdx = -1;
    const drop = document.getElementById('histDrop');
    const hist  = loadHistory();
    _filteredHist = filter
      ? hist.filter(h => h.url.toLowerCase().includes(filter.toLowerCase()))
      : hist;

    if (_filteredHist.length === 0) {
      drop.innerHTML = `<div class="hist-empty">${hist.length === 0 ? 'No history yet' : 'No matches'}</div>`;
      return;
    }

    drop.innerHTML =
      _filteredHist.map((h, i) => `
        <div class="hist-item" data-idx="${i}">
          ${h.thumbnail
            ? `<img class="hist-thumb" src="${escHtml(h.thumbnail)}" alt="">`
            : `<div class="hist-thumb-ph">▪</div>`}
          <span class="hist-url" title="${escHtml(h.url)}">${escHtml(h.url)}</span>
          <span class="hist-meta">
            ${h.count > 0 ? `<span class="hist-count">${h.count} imgs</span>` : ''}
            <span class="hist-date">${formatDate(h.date)}</span>
          </span>
          <button class="hist-del" data-idx="${i}" title="Remove">✕</button>
        </div>`).join('') +
      `<div class="hist-footer">
        <button class="hist-clear-all" id="histClearAll">Clear all history</button>
      </div>`;

    document.getElementById('histClearAll').addEventListener('click', e => {
      e.stopPropagation(); clearHistory();
    });

    drop.querySelectorAll('.hist-del').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        removeFromHistory(_filteredHist[+btn.dataset.idx].url);
        if (histPos >= loadHistory().length) histPos = loadHistory().length - 1;
        updateHistNav();
        if (loadHistory().length === 0) { hideHistDrop(); return; }
        renderHistDrop(document.getElementById('urlInput').value.trim() || undefined);
      });
    });

    drop.querySelectorAll('.hist-item').forEach(el => {
      el.addEventListener('click', () => gotoHist(+el.dataset.idx));
    });
  }

  function showHistDrop() {
    if (loadHistory().length === 0) return;
    renderHistDrop();
    histDrop.classList.add('open');
  }

  function hideHistDrop() {
    histDrop.classList.remove('open');
    histHighlightIdx = -1;
  }

  function selectHistItem(entry) {
    document.getElementById('urlInput').value = entry.url;
    if (entry.digits !== undefined)   document.getElementById('digits').value   = entry.digits;
    if (entry.ext)                    document.getElementById('ext').value      = entry.ext;
    if (entry.startNum !== undefined) document.getElementById('startNum').value = entry.startNum;
    if (entry.maxFails !== undefined) document.getElementById('maxFails').value = entry.maxFails;
    document.getElementById('urlHint').classList.remove('visible');
    hideHistDrop();
    startLoad();
  }

  /* ── url detection ── */
  function detectPattern(url) {
    // Match a trailing zero-padded number + image extension
    const m = url.match(/^(.*?)(\d+)(\.jpe?g|\.png|\.webp|\.gif)$/i);
    if (!m) return null;
    const numStr = m[2];
    const digits = Math.max(1, Math.min(4, numStr.length));
    const ext    = m[3].toLowerCase();
    return { base: m[1], numStr, digits, ext };
  }

  function updateUrlHint() {
    const hint    = document.getElementById('urlHint');
    const raw     = urlInput.value.trim();
    const detected = detectPattern(raw);
    if (detected) {
      hint.innerHTML =
        `↳ image URL detected — base: <span class="hint-base">${escHtml(detected.base)}</span>` +
        `<span class="hint-tag">${detected.digits}-digit</span>` +
        `<span class="hint-tag">${detected.ext}</span>`;
      hint.classList.add('visible');
    } else {
      hint.classList.remove('visible');
    }
  }

  /* ── load ── */
  async function startLoad(fromNav) {
    const raw = document.getElementById('urlInput').value.trim();
    if (!raw) { alert('Please enter a base URL.'); return; }

    // Auto-strip filename if user pasted a full image URL
    const detected = detectPattern(raw);
    if (detected) {
      urlInput.value = detected.base;
      document.getElementById('digits').value = detected.digits;
      document.getElementById('ext').value    = detected.ext;
    }
    document.getElementById('urlHint').classList.remove('visible');

    const url     = detected ? detected.base : raw;
    hideHistDrop();
    clearAll(true);
    halted = false;

    const startN  = parseInt(document.getElementById('startNum').value) || 1;
    const digits  = parseInt(document.getElementById('digits').value);
    const ext     = document.getElementById('ext').value;
    const maxFail = parseInt(document.getElementById('maxFails').value) || 1;

    setUI('scanning');
    setStatus('scanning', 'Scanning…');

    let n = startN, found = 0, fails = 0;

    while (!halted) {
      const num = pad(n, digits);
      const src = `${url}${num}${ext}`;
      const ok  = await probe(src);

      addTapeCell(num, ok);

      if (ok) {
        found++;
        fails = 0;
        addTile(src, num);
        updateHeader(found);
        setStatus('scanning', `Scanning… ${found} image${found !== 1 ? 's' : ''} found`);
      } else {
        fails++;
        if (fails >= maxFail) break;
      }
      n++;
    }

    setUI('idle');
    if (imgs.length > 0) {
      setStatus('done', `Done — ${imgs.length} image${imgs.length !== 1 ? 's' : ''} loaded`);
      if (!fromNav) {
        saveToHistory({ url, digits, ext, startNum: startN, maxFails: maxFail, count: imgs.length, thumbnail: imgs[0].src, date: new Date().toISOString() });
        histPos = 0;
      }
      updateHistNav();
    } else {
      setStatus('error', 'No images found. Check the URL and settings.');
    }
  }

  function probe(src) {
    return new Promise(resolve => {
      const i = new Image();
      i.onload  = () => resolve(true);
      i.onerror = () => resolve(false);
      i.src = src;
    });
  }

  /* ── gallery ── */
  function addTile(src, label) {
    if (imgs.length === 0) {
      document.getElementById('gallery').innerHTML =
        '<div class="grid" id="grid"></div>';
    }
    const idx = imgs.length;
    imgs.push({ src, label });

    const tile = document.createElement('div');
    tile.className = 'tile';
    tile.style.animationDelay = `${Math.min(idx * 40, 300)}ms`;
    tile.onclick = () => openLb(idx);
    tile.innerHTML = `
      <img src="${src}" alt="Image ${label}" loading="lazy">
      <div class="tile-label">
        <span class="tile-num">${label}</span>
        <span class="tile-expand">&#x2922;</span>
      </div>`;
    document.getElementById('grid').appendChild(tile);
  }

  /* ── scan tape ── */
  function addTapeCell(label, ok) {
    document.getElementById('tape').style.display = 'block';
    const cell = document.createElement('span');
    cell.className = `tape-cell ${ok ? 'ok' : 'fail'}`;
    cell.textContent = label;
    const inner = document.getElementById('tapeInner');
    inner.appendChild(cell);
    if (inner.children.length > 30) inner.removeChild(inner.firstChild);
  }

  /* ── ui helpers ── */
  function setStatus(state, msg) {
    const dot = document.getElementById('dot');
    dot.className = 'dot';
    if (state === 'scanning') dot.classList.add('scanning');
    if (state === 'done')     dot.classList.add('done');
    if (state === 'error')    dot.classList.add('error');
    document.getElementById('statusTxt').textContent = msg;
  }

  function setUI(state) {
    const scanning = state === 'scanning';
    document.getElementById('loadBtn').disabled = scanning;
    document.getElementById('stopBtn').style.display = scanning ? '' : 'none';
  }

  function updateHeader(n) {
    document.getElementById('headerInfo').textContent =
      `${n} image${n !== 1 ? 's' : ''}`;
  }

  function stop() { halted = true; }

  function clearAll(skipResetInput) {
    halted = true;
    imgs = [];
    lbIdx = 0;
    document.getElementById('gallery').innerHTML = `
      <div class="empty">
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="4"  y="4"  width="24" height="24" rx="4" fill="#e6e8f0"/>
          <rect x="36" y="4"  width="24" height="24" rx="4" fill="#e6e8f0"/>
          <rect x="4"  y="36" width="24" height="24" rx="4" fill="#e6e8f0"/>
          <rect x="36" y="36" width="24" height="24" rx="4" fill="#e6e8f0"/>
        </svg>
        <p>Images will appear as they load.</p>
      </div>`;
    document.getElementById('tape').style.display = 'none';
    document.getElementById('tapeInner').innerHTML = '';
    document.getElementById('headerInfo').textContent = 'no images loaded';
    if (!skipResetInput) {
      document.getElementById('urlInput').value = '';
      document.getElementById('urlHint').classList.remove('visible');
      setStatus('idle', 'Enter a base URL and click Load.');
    }
  }

  /* ── lightbox ── */
  function openLb(idx) {
    lbIdx = idx;
    renderLb();
    document.getElementById('lb').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLb() {
    document.getElementById('lb').classList.remove('open');
    document.body.style.overflow = '';
  }

  function lbNav(dir) {
    lbIdx = Math.max(0, Math.min(imgs.length - 1, lbIdx + dir));
    renderLb();
  }

  function renderLb() {
    const { src, label } = imgs[lbIdx];
    document.getElementById('lbImg').src  = src;
    document.getElementById('lbCount').textContent = `${lbIdx + 1} / ${imgs.length}`;
    document.getElementById('lbSrc').textContent   = src;
    document.getElementById('lbDl').href     = src;
    document.getElementById('lbDl').download = `image_${label}`;
    document.getElementById('lbPrev').disabled = lbIdx === 0;
    document.getElementById('lbNext').disabled = lbIdx === imgs.length - 1;
  }

  /* ── events ── */
  const urlInput = document.getElementById('urlInput');
  const histDrop = document.getElementById('histDrop');

  // Keep focus on input when clicking inside dropdown
  histDrop.addEventListener('mousedown', e => e.preventDefault());

  urlInput.addEventListener('focus', () => showHistDrop());
  urlInput.addEventListener('blur',  () => hideHistDrop());
  urlInput.addEventListener('input', () => {
    updateUrlHint();
    if (loadHistory().length === 0) { hideHistDrop(); return; }
    renderHistDrop();         // always show full list — no filtering
    histDrop.classList.add('open');
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('.url-wrap')) hideHistDrop();
  });

  document.addEventListener('keydown', e => {
    // Lightbox takes priority
    if (document.getElementById('lb').classList.contains('open')) {
      if (e.key === 'Escape')     closeLb();
      if (e.key === 'ArrowLeft')  lbNav(-1);
      if (e.key === 'ArrowRight') lbNav(1);
      return;
    }

    // Dropdown arrow navigation (only when dropdown is open)
    if (histDrop.classList.contains('open')) {
      const items = histDrop.querySelectorAll('.hist-item');
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        highlightHistItem(histHighlightIdx < items.length - 1 ? histHighlightIdx + 1 : 0);
        return;
      }
      if (e.key === 'ArrowUp') {
        e.preventDefault();
        highlightHistItem(histHighlightIdx > 0 ? histHighlightIdx - 1 : items.length - 1);
        return;
      }
      if (e.key === 'Enter' && histHighlightIdx >= 0) {
        e.preventDefault();
        gotoHist(histHighlightIdx);
        return;
      }
      if (e.key === 'Escape') { hideHistDrop(); return; }
    }

    if (e.key === 'Enter' && document.activeElement === urlInput) startLoad();
    if (e.key === 'Escape') hideHistDrop();

    // Arrow keys navigate history; Enter opens lightbox — when input is not focused
    if (document.activeElement !== urlInput) {
      if (e.key === 'ArrowLeft')  { e.preventDefault(); navHist(-1); }
      if (e.key === 'ArrowRight') { e.preventDefault(); navHist(1); }
      if (e.key === 'Enter' && imgs.length > 0) { e.preventDefault(); openLb(lbIdx < imgs.length ? lbIdx : 0); }
    }
  });

  document.getElementById('lb').addEventListener('click', e => {
    if (e.target === document.getElementById('lb')) closeLb();
  });
</script>
</body>
</html>
